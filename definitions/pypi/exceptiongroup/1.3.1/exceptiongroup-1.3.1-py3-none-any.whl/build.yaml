# inference differs:
#  source diff:
#    git clone https://github.com/agronholm/exceptiongroup .
#    git checkout --force 'ddddb6fdf8582c4ae5187dc1bd258115974229fe'
#   +rm -rf /src/.git
#  build diff:
#   -/deps/bin/python3 -m build --wheel -n
#   +SETUPTOOLS_SCM_PRETEND_VERSION=1.3.1 /deps/bin/python3 -m build --wheel -n
flow:
  location:
    repo: https://github.com/agronholm/exceptiongroup
    ref: ddddb6fdf8582c4ae5187dc1bd258115974229fe
  src:
    - uses: git-checkout
    # Upstream's release pipeline runs without a .git dir, so setuptools-scm
    # falls back to its tag/version with commit_id=None. Drop .git here so
    # the rebuilt _version.py matches.
    - runs: rm -rf /src/.git
  deps:
    - uses: pypi/setup-venv
      with:
        locator: /usr/bin/
        path: /deps
    - uses: pypi/setup-registry
      with:
        registryTime: "2025-11-21T23:01:53Z"
    - runs: /deps/bin/pip install flit_core==3.12.0 flit==3.12.0 setuptools==67.7.2 flit_scm build
  build:
    - runs: SETUPTOOLS_SCM_PRETEND_VERSION=1.3.1 /deps/bin/python3 -m build --wheel -n
  output_dir: dist
