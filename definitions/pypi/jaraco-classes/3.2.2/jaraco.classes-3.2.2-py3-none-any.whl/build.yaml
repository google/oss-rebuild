# inference differs:
#  source diff:
#    git clone https://github.com/jaraco/jaraco.classes .
#    git checkout --force '46ca809120a44279532d6d74f6b00842b0188925'
#   +rm -rf /src/.git
#  deps diff:
#   -/usr/bin/python3 -m venv /deps
#   +/usr/bin/uvx uv venv /deps --seed --python 3.11
#    export PIP_INDEX_URL=http://pypi:2022-07-13T02:22:49Z@TIMEWARP/simple
#   -/deps/bin/pip install build setuptools==67.7.2 setuptools_scm[toml]>=3.4.1 wheel==0.37.1
#   +/deps/bin/pip install build setuptools==63.1.0 setuptools_scm[toml]>=3.4.1 wheel==0.37.1
#  build diff:
#   -/deps/bin/python3 -m build --wheel -n
#   +SETUPTOOLS_SCM_PRETEND_VERSION=3.2.2 /deps/bin/python3 -m build --wheel -n
flow:
  location:
    repo: https://github.com/jaraco/jaraco.classes
    ref: 46ca809120a44279532d6d74f6b00842b0188925
  src:
    - uses: git-checkout
    # Upstream's release pipeline runs without a .git dir; setuptools-scm
    # falls back to its tag/version with commit_id=None.
    - runs: rm -rf /src/.git
  deps:
    - uses: pypi/setup-venv
      with:
        locator: /usr/bin/
        path: /deps
        # Latest setuptools at registry-time (2022-07) is 63.1.0; that pulls
        # in pkg_resources which uses `pkgutil.ImpImporter` (removed in
        # Python 3.12). Pin Python 3.11 to keep the import working.
        pythonVersion: "3.11"
    - uses: pypi/setup-registry
      with:
        registryTime: "2022-07-13T02:22:49Z"
    - runs: /deps/bin/pip install setuptools==63.1.0 wheel==0.37.1 'setuptools_scm[toml]>=3.4.1' build
  build:
    - runs: SETUPTOOLS_SCM_PRETEND_VERSION=3.2.2 /deps/bin/python3 -m build --wheel -n
  output_dir: dist
