# inference differs:
#  source diff:
#    git clone https://github.com/pytest-dev/pytest .
#    git checkout --force 'a7d58d7a21b78581e636bbbdea13c66ad1657c1e'
#   +rm -rf /src/.git
#  build diff:
#   -/deps/bin/python3 -m build --wheel -n
#   +SETUPTOOLS_SCM_PRETEND_VERSION=9.0.3 /deps/bin/python3 -m build --wheel -n
flow:
  location:
    repo: https://github.com/pytest-dev/pytest
    ref: a7d58d7a21b78581e636bbbdea13c66ad1657c1e
  src:
    - uses: git-checkout
    # Upstream's _pytest/_version.py has `commit_id = None`, suggesting the
    # release wheel was built from a checkout where setuptools-scm couldn't
    # query git (e.g. an sdist tarball, or with .git removed). Reproduce that
    # by blowing away .git before the build runs.
    - runs: rm -rf /src/.git
  deps:
    - uses: pypi/setup-venv
      with:
        locator: /usr/bin/
        path: /deps
    - uses: pypi/setup-registry
      with:
        registryTime: "2026-04-07T17:16:16Z"
    - runs: /deps/bin/pip install setuptools==82.0.1 'setuptools-scm[toml]>=6.2.3' build
  build:
    # SETUPTOOLS_SCM_PRETEND_VERSION lets setuptools-scm work without git.
    - runs: SETUPTOOLS_SCM_PRETEND_VERSION=9.0.3 /deps/bin/python3 -m build --wheel -n
  output_dir: dist
