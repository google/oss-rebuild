# inference differs:
#  source diff:
#    git clone https://github.com/websocket-client/websocket-client .
#    git checkout --force '3dc494588c4bc6ca1cbb745e9d110108f6bf04f0'
#   +sed -i 's|package_data={"websocket.tests":|package_data={"websocket": ["py.typed"], "websocket.tests":|' /src/setup.py
#  deps diff:
#    /usr/bin/python3 -m venv /deps
#    export PIP_INDEX_URL=http://pypi:2024-04-23T22:16:14Z@TIMEWARP/simple
#   -/deps/bin/pip install build setuptools==67.7.2 wheel==0.43.0
#   +/deps/bin/pip install build setuptools==69.5.1 wheel==0.43.0
flow:
  location:
    repo: https://github.com/websocket-client/websocket-client
    ref: 3dc494588c4bc6ca1cbb745e9d110108f6bf04f0
  src:
    - uses: git-checkout
    # Upstream wheel ships `websocket/py.typed` (PEP 561 marker) but
    # setup.py's `package_data` only lists `websocket.tests/data/*.txt`.
    # The published wheel was built with this file included.
    - runs: |
        sed -i 's|package_data={"websocket.tests":|package_data={"websocket": ["py.typed"], "websocket.tests":|' /src/setup.py
  deps:
    - uses: pypi/setup-venv
      with:
        locator: /usr/bin/
        path: /deps
    - uses: pypi/setup-registry
      with:
        registryTime: "2024-04-23T22:16:14Z"
    - runs: /deps/bin/pip install setuptools==69.5.1 wheel==0.43.0 build
  build:
    - runs: /deps/bin/python3 -m build --wheel -n
  output_dir: dist
