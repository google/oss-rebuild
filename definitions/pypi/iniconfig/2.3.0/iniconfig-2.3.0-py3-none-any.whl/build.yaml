# inference differs:
#  source diff:
#    git clone https://github.com/pytest-dev/iniconfig .
#    git checkout --force '7faed13ae50bad7c5da3f5782f254a8a7736bb84'
#   +rm -rf /src/.git
#  build diff:
#   -/deps/bin/python3 -m build --wheel -n
#   +SETUPTOOLS_SCM_PRETEND_VERSION=2.3.0 /deps/bin/python3 -m build --wheel -n
flow:
  location:
    repo: https://github.com/pytest-dev/iniconfig
    ref: 7faed13ae50bad7c5da3f5782f254a8a7736bb84
  src:
    - uses: git-checkout
    # Upstream's _version.py has commit_id=None — release built without git.
    - runs: rm -rf /src/.git
  deps:
    - uses: pypi/setup-venv
      with:
        locator: /usr/bin/
        path: /deps
    - uses: pypi/setup-registry
      with:
        registryTime: "2025-10-18T21:55:41Z"
    - runs: /deps/bin/pip install setuptools==80.9.0 'setuptools-scm>=8' build
  build:
    - runs: SETUPTOOLS_SCM_PRETEND_VERSION=2.3.0 /deps/bin/python3 -m build --wheel -n
  output_dir: dist
