# inference differs:
#  deps diff:
#   -/usr/bin/python3 -m venv /deps
#   +/usr/bin/uvx uv venv /deps --seed --python 3.9
#    export PIP_INDEX_URL=http://pypi:2025-07-17T16:51:58Z@TIMEWARP/simple
#   -/deps/bin/pip install build setuptools==67.7.2 wheel==0.37.1
#   +/deps/bin/pip install --no-deps setuptools==60.10.0 wheel==0.37.1
#   +/deps/bin/pip install build
flow:
  location:
    repo: https://github.com/pypa/distlib
    ref: aff2cbbc4e8a87b9440cb93472789a213813dbd6
  src:
    - uses: git-checkout
  deps:
    - uses: pypi/setup-venv
      with:
        locator: /usr/bin/
        path: /deps
        # setuptools 58.5.3-62.0.0 writes PKG-INFO with three trailing newlines
        # and Python 3.9's email.parser preserves them when wheel reads
        # PKG-INFO back. Newer Python or setuptools strips back to one.
        # Upstream WHEEL indicates `bdist_wheel (0.37.1)`.
        pythonVersion: "3.9"
    - uses: pypi/setup-registry
      with:
        registryTime: "2025-07-17T16:51:58Z"
    - runs: /deps/bin/pip install --no-deps setuptools==60.10.0 wheel==0.37.1
    - runs: /deps/bin/pip install build
  build:
    - runs: /deps/bin/python3 -m build --wheel -n
  output_dir: dist
