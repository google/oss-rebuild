# inference differs:
#  deps diff:
#    /usr/bin/uvx uv venv /deps --seed --python 3.11
#    export PIP_INDEX_URL=http://pypi:2021-03-04T09:44:55Z@TIMEWARP/simple
#   -/deps/bin/pip install build setuptools==56.2.0 wheel==0.34.2
#   +/deps/bin/pip install --no-deps setuptools==54.0.0 wheel==0.34.2
#  build diff:
#   -/deps/bin/python3 -m build --wheel -n
#   +/deps/bin/python3 setup.py bdist_wheel
flow:
  location:
    repo: https://github.com/tiran/defusedxml
    ref: 6653936f117fba5348a271b7d314951275088162
  src:
    - uses: git-checkout
  deps:
    - uses: pypi/setup-venv
      with:
        locator: /usr/bin/
        path: /deps
        pythonVersion: "3.11"
    - uses: pypi/setup-registry
      with:
        registryTime: "2021-03-04T09:44:55Z"
    # Latest setuptools at registry-time (2021-03) is 54.0.0; the inferer's
    # setuptools==56.2.0 heuristic doesn't apply this far back.
    - runs: /deps/bin/pip install --no-deps setuptools==54.0.0 wheel==0.34.2
  build:
    - runs: /deps/bin/python3 setup.py bdist_wheel
  output_dir: dist
