flow:
  location:
    repo: https://github.com/jsx-eslint/eslint-plugin-react
    ref: 6d86837cfaf4ee2687f72dfeea003964e9e6e208
    dir: ""
  src:
    - uses: git-checkout
  deps:
    - uses: npm/install-node
      with:
        nodeVersion: "20.6.1"
    - uses: npm/install
      with:
        npmVersion: "9.8.1"
        registryTime: "2023-08-16T04:22:36Z"
        locator: /usr/local/bin/
  build:
    # `prepack` runs `npmignore --auto` to write `.npmignore` from
    # `publishConfig.ignore`. Run it explicitly (npm 6+ skips lifecycle
    # hooks under root unless --unsafe-perm) then npm pack.
    - runs: |
        cd /src && \
          ./node_modules/.bin/npmignore --auto --commentLines=autogenerated && \
          /usr/local/bin/npm pack
  output_dir: ""
  requires:
    system_deps:
      - libstdc++
