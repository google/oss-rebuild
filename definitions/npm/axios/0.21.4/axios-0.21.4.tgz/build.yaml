npm_pack_build:
  location:
    repo: https://github.com/axios/axios
    # Registry's `gitHead` (84f009d8...) isn't in the public repo. The
    # v0.21.4 tag (66c4602) is a merge whose tree includes post-tag
    # commits the published wheel doesn't (cd7ff04 added `status:` to
    # enhanceError.js, c26762f added `"types"` to package.json). The
    # actual release commit `fc15665` ("[Releasing] v0.21.4") sits on
    # top of c2714f0 ("README typo fix") and 0fc7248 ("fix json
    # transform"); its tree has version=0.21.4, freshly-rebuilt dist/
    # files with the `axios v0.21.4` banner, and none of cd7ff04 /
    # c26762f. `npm pack` against fc15665 reproduces upstream except
    # for one CHANGELOG.md typo fix the publisher hand-applied before
    # publishing — see the custom stabilizer below.
    ref: fc15665cc372bc7d2c59901e04c216c590364a67
  npm_version: "6.14.18"
custom_stabilizers:
  - replace_pattern:
      paths: ["package/CHANGELOG.md"]
      pattern: "backward compatability and complying"
      replace: "backward compatibility and complying"
    reason: |
      The fc15665 release commit's CHANGELOG.md still says
      "backward compatability" (typo). Upstream wheel says
      "compatibility" — the publisher hand-fixed the typo in the
      working tree before `npm pack`, but never committed the fix; it
      didn't land in the repo until 008dd9d (a v0.27.0 release commit
      in 2022). Normalize so the rebuild matches upstream.
