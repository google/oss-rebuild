#  deps diff:
#   -wget -O - https://unofficial-builds.nodejs.org/download/release/v20.7.0/node-v20.7.0-linux-x64-musl.tar.gz | tar xzf - --strip-components=1 -C /usr/local/
#   -/usr/local/bin/npx --package=npm@10.1.0 -c 'npm_config_registry=http://npm:2023-09-27T06:04:07Z@TIMEWARP npm install --force --no-audit'
#   +wget -O - https://unofficial-builds.nodejs.org/download/release/v20.8.1/node-v20.8.1-linux-x64-musl.tar.gz | tar xzf - --strip-components=1 -C /usr/local/
#   +/usr/local/bin/npx --package=npm@10.1.0 -c 'npm_config_registry=http://npm:2023-10-26T00:00:00Z@TIMEWARP npm install --force --no-audit'
#  build diff:
#   -/usr/local/bin/npx --package=npm@10.1.0 -c 'npm pack'
#   +cd /src && /usr/local/bin/npm pack
flow:
  location:
    repo: https://github.com/isaacs/rimraf
    ref: 3cc9222c646393713f671b807731f2d70f554850
    dir: ""
  src:
    - uses: git-checkout
  deps:
    - uses: npm/install-node
      with:
        nodeVersion: "20.8.1"
    - uses: npm/install
      with:
        npmVersion: "10.1.0"
        registryTime: "2023-10-26T00:00:00Z"
        locator: /usr/local/bin/
  build:
    # `prepare` script runs tshy. npm install triggers prepare on
    # development installs (which is what `npm install` does) but not
    # production. Run npm pack — which runs prepack/prepare; but rimraf
    # has prepublishOnly: 'git push origin --follow-tags' which requires
    # git remote. npm pack only fires prepack and prepare. The prepare
    # script is `tshy`, which will rebuild dist/ from src/.
    - runs: cd /src && /usr/local/bin/npm pack
  output_dir: ""
  requires:
    system_deps:
      - libstdc++
