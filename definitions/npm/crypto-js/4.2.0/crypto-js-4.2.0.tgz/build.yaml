flow:
  location:
    repo: https://github.com/brix/crypto-js
    ref: ac34a5a584337b33a2e567f50d96819a96ac44bf
    dir: ""
  src:
    - uses: git-checkout
  deps:
    - uses: npm/install-node
      with:
        nodeVersion: "18.18.0"
    - uses: npm/install
      with:
        npmVersion: "10.2.1"
        registryTime: "2023-10-24T22:20:30Z"
        locator: /usr/local/bin/
  build:
    # `grunt build` emits modularized .js into `build/` and writes a
    # filtered `build/package.json` (via update_json:npm) — the publish
    # tree. Publisher runs `npm publish build/`; we mirror with
    # `npm pack` from /src/build.
    - runs: cd /src && /usr/local/bin/npm run build && cd /src/build && /usr/local/bin/npm pack
  output_dir: build
  requires:
    system_deps:
      - libstdc++
