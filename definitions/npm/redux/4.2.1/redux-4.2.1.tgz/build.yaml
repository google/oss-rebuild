flow:
  location:
    repo: https://github.com/reduxjs/redux
    ref: f4b3ab9ac5370c5520d08383c5fc88e1e1c64587
    dir: ""
  src:
    - uses: git-checkout
  deps:
    - uses: npm/install-node
      with:
        nodeVersion: "18.18.0"
    - uses: npm/install
      with:
        npmVersion: "9.8.1"
        registryTime: "2023-01-22T00:00:00Z"
        locator: /usr/local/bin/
  build:
    - runs: cd /src && /usr/local/bin/npm run build
    # Upstream tarball's package.json has CRLF line endings — likely a
    # maintainer Windows checkout or a working-tree text-mode write.
    # Source's `.gitattributes` is absent. Convert before packing so
    # the rebuilt tarball matches.
    - runs: sed -i 's/$/\r/' /src/package.json
    - runs: cd /src && /usr/local/bin/npm pack
  output_dir: ""
  requires:
    system_deps:
      - libstdc++
