flow:
  location:
    repo: https://github.com/ljharb/qs
    ref: 410bdd3c8ae7f5d7ae9b52648b8642b8adc5e1c0
    dir: ""
  src:
    - uses: git-checkout
  deps:
    - uses: npm/install-node
      with:
        nodeVersion: "20.1.0"
    # `prepack` runs `npmignore --auto`. Install just npmignore globally
    # (skip the heavy devDep tree).
    - runs: |
        /usr/local/bin/npm install -g npmignore@0.3.0 \
          --registry=http://npm:2023-05-15T16:08:32Z@127.0.0.1:8080
  build:
    - runs: |
        cd /src && \
          /usr/local/bin/npmignore --auto --commentLines=autogenerated && \
          /usr/local/bin/npm pack
  output_dir: ""
  requires:
    system_deps:
      - libstdc++
