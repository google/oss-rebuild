# inference differs:
#   requires.system_deps: added make, libstdc++ (vs inferred)
#  deps diff:
#    wget -O - https://unofficial-builds.nodejs.org/download/release/v10.24.1/node-v10.24.1-linux-x64-musl.tar.gz | tar xzf - --strip-components=1 -C /usr/local/
#   -/usr/local/bin/npx --package=npm@6.14.12 -c 'npm_config_registry=http://npm:2023-07-02T20:05:09Z@TIMEWARP npm install --force --no-audit'
#   +/usr/local/bin/npx --package=npm@6.14.12 -c 'npm_config_registry=http://npm:2023-07-02T20:05:10Z@TIMEWARP npm install --force --no-audit'
#  build diff:
#   -/usr/local/bin/npx --package=npm@6.14.12 -c 'npm config set unsafe-perm true && npm pack'
#   +cd /src && /usr/local/bin/npm run prepublishOnly && /usr/local/bin/npm pack
flow:
  location:
    repo: https://github.com/lquixada/cross-fetch
    ref: 0922089bb632037e58564661c2ae9482bbbf4580
    dir: ""
  src:
    - uses: git-checkout
  deps:
    - uses: npm/install-node
      with:
        nodeVersion: "10.24.1"
    - uses: npm/install
      with:
        npmVersion: "6.14.12"
        registryTime: "2023-07-02T20:05:10Z"
        locator: /usr/local/bin/
  build:
    # `prepublishOnly` is `rimraf dist && make build`; run it explicitly
    # since npm 6 skips lifecycle hooks under root.
    - runs: cd /src && /usr/local/bin/npm run prepublishOnly && /usr/local/bin/npm pack
  output_dir: ""
  requires:
    system_deps:
      - make
      - libstdc++
