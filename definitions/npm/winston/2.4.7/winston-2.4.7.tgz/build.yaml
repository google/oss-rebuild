# inference differs:
#   requires.system_deps: added libstdc++; removed npm (vs inferred)
#  source diff:
#   -git clone https://github.com/winstonjs/winston .
#   +git clone -c core.autocrlf=true https://github.com/winstonjs/winston .
#    git checkout --force 'b8baf4c6797d652f882e61a8a3bd8d00875e5596'
#  deps diff:
#   +wget -O - https://unofficial-builds.nodejs.org/download/release/v16.10.0/node-v16.10.0-linux-x64-musl.tar.gz | tar xzf - --strip-components=1 -C /usr/local/
#  build diff:
#   -/usr/bin/npx --package=npm@8.13.0 -c 'npm pack'
#   +cd /src && /usr/local/bin/npm pack
flow:
  location:
    repo: https://github.com/winstonjs/winston
    ref: b8baf4c6797d652f882e61a8a3bd8d00875e5596
    dir: ""
  src:
    # Publisher built on Windows; ships every text file with CRLF.
    # `crlf: true` re-checks-out with `core.autocrlf=true`, honoring any
    # `.gitattributes` rules and only converting text-classified files.
    - uses: git-checkout
      with:
        crlf: "true"
  deps:
    - uses: npm/install-node
      with:
        nodeVersion: "16.10.0"
  build:
    - runs: cd /src && /usr/local/bin/npm pack
  output_dir: ""
  requires:
    system_deps:
      - libstdc++
